<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Design</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{ background:#f5f7fb; }
        .main-card{ border:0; border-radius:18px; }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="card main-card shadow-sm">
        <div class="card-body p-4">
            <h2 class="fw-bold mb-4">Edit Design</h2>

            <div class="mb-3">
                <img src="/database/{{ filename }}" class="img-fluid rounded shadow-sm" style="max-width:300px;" alt="{{ filename }}">
            </div>

            <form method="POST">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Fabric</label>
                        <select class="form-select" name="fabric_select">
                            <option value="">Select Fabric</option>
                            {% for item in fabric_options %}
                                <option value="{{ item }}" {% if selected_fabric == item %}selected{% endif %}>{{ item }}</option>
                            {% endfor %}
                            <option value="Other" {% if selected_fabric == "Other" %}selected{% endif %}>Other</option>
                        </select>
                        <input type="text" name="fabric_custom" class="form-control mt-2" value="{{ custom_fabric }}" placeholder="Custom fabric">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Work Type</label>
                        <select class="form-select" name="work_type_select">
                            <option value="">Select Work Type</option>
                            {% for item in work_type_options %}
                                <option value="{{ item }}" {% if selected_work_type == item %}selected{% endif %}>{{ item }}</option>
                            {% endfor %}
                            <option value="Other" {% if selected_work_type == "Other" %}selected{% endif %}>Other</option>
                        </select>
                        <input type="text" name="work_type_custom" class="form-control mt-2" value="{{ custom_work_type }}" placeholder="Custom work type">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Color</label>
                        <input type="text" name="color" class="form-control" value="{{ details.color }}">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Occasion</label>
                        <input type="text" name="occasion" class="form-control" value="{{ details.occasion }}">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Notes</label>
                        <input type="text" name="notes" class="form-control" value="{{ details.notes }}">
                    </div>
                </div>

                <div class="mt-4 d-flex gap-2 flex-wrap">
                    <button type="submit" class="btn btn-success">Save Changes</button>
                    <a href="/gallery" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
