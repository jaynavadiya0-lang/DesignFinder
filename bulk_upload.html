<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk Upload</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{background:#f5f6fa;}
        .main-card{
            border:none;
            border-radius:18px;
            box-shadow:0 10px 25px rgba(0,0,0,.08);
        }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="d-flex flex-wrap justify-content-between align-items-center mb-3">
        <h2 class="fw-bold m-0">📦 Bulk Upload</h2>
        <div class="mt-2 mt-md-0">
            <a href="/" class="btn btn-dark btn-sm">Home</a>
            <a href="/gallery" class="btn btn-outline-dark btn-sm">Gallery</a>
            <a href="/dashboard" class="btn btn-outline-dark btn-sm">Dashboard</a>
        </div>
    </div>

    {% if message %}
    <div class="alert alert-info">{{ message }}</div>
    {% endif %}

    <div class="card main-card p-3 p-md-4 mb-4">
        <form method="POST" enctype="multipart/form-data">
            <label class="form-label">Select Multiple Images</label>
            <input type="file" name="images" class="form-control mb-3" multiple required>
            <button class="btn btn-primary">Upload All</button>
        </form>
    </div>

    {% if added_files %}
    <div class="card main-card p-3 p-md-4">
        <h4 class="mb-3">Added Files</h4>
        <div class="table-responsive">
            <table class="table table-bordered align-middle">
                <thead>
                    <tr>
                        <th>File Name</th>
                        <th>Design ID</th>
                    </tr>
                </thead>
                <tbody>
                    {% for item in added_files %}
                    <tr>
                        <td>{{ item.filename }}</td>
                        <td>{{ item.design_id }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
    {% endif %}
</div>

</body>
</html>
